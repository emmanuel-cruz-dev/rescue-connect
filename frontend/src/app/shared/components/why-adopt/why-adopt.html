<section
  class="flex items-center py-16 bg-linear-to-b from-white to-pink-50/90 dark:bg-slate-900 dark:bg-linear-to-b dark:from-slate-900 dark:to-pink-950/30"
>
  <div
    class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 items-center"
  >
    <figure
      pAnimateOnScroll
      once="true"
      enterClass="animate-enter fade-in-10 slide-in-from-t-8 animate-duration-1000 animate-delay-200"
      class="max-w-md lg:max-w-none mx-auto"
    >
      <img
        src="assets/images/adopt/adopt-izquierda.avif"
        class="w-full h-full object-cover drop-shadow-xl/20"
        alt="Fotografía compuesta de cuatro perros rescatados; destaca un perro negro de raza grande usando un carrito de movilidad, rodeado de otros perros sonrientes en un entorno soleado"
        width="682"
        height="700"
        loading="lazy"
      />
    </figure>

    <div class="flex flex-col items-center text-center gap-6">
      <h2
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 zoom-in-90 animate-duration-1000"
        class="text-3xl lg:text-4xl font-bold text-gray-900 dark:text-white leading-tight"
      >
        ¿Por qué <span class="text-pink-600">adoptar</span> en vez de comprar?
      </h2>

      <div
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-0 zoom-in-90 animate-duration-1000 animate-delay-300"
        class="text-gray-600 dark:text-gray-300 leading-relaxed"
      >
        <p>
          Adoptar es darle una
          <strong class="text-gray-800 dark:text-white">segunda oportunidad</strong>
          a un ser lleno de amor.
        </p>
        <p>
          No solo cambiás su vida:
          <strong class="text-gray-800 dark:text-white">también cambiás la tuya</strong>. Además,
          ayudás a que otro animal pueda ser rescatado.
        </p>
        <p>
          Es un acto de
          <strong class="text-gray-800 dark:text-white">amor, compromiso y responsabilidad</strong>.
        </p>
      </div>

      <p-button
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-b-8 animate-duration-1000 animate-delay-500"
        label="Adoptá ahora"
        icon="custom__pet-icon"
        [routerLink]="['/pets']"
        size="large"
        styleClass="mt-2 bg-pink-600! hover:bg-pink-700! border-pink-600! text-white! px-10!"
      />
    </div>

    <figure
      pAnimateOnScroll
      once="true"
      enterClass="animate-enter fade-in-10 slide-in-from-t-8 animate-duration-1000 animate-delay-200"
      class="hidden lg:block"
    >
      <img
        src="assets/images/adopt/adopt-derecha.avif"
        class="w-full h-full object-cover drop-shadow-xl/20"
        alt="Collage de cuatro fotos de perros: un primer plano de un perro color canela con la lengua fuera, un cachorro negro con pecho blanco, un perro senior descansando con ropa y un perro mestizo peludo sonriendo"
        width="682"
        height="700"
        loading="lazy"
      />
    </figure>
  </div>
</section>
