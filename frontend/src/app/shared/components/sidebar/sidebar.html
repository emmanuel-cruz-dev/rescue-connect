<aside
  class="flex flex-col h-full w-64 bg-white dark:bg-slate-900 border-r border-gray-100 dark:border-gray-700 shadow-sm"
>
  @if (showHeader()) {
  <div
    class="flex items-center justify-between px-3 py-5 border-b border-gray-100 dark:border-gray-700"
  >
    <div class="flex items-center gap-2">
      <figure class="w-8 h-8 shrink-0">
        <img
          src="/assets/images/logos/logo.png"
          alt="Rescue Connect logo"
          class="w-full object-contain"
        />
      </figure>
      <span class="font-semibold text-gray-800 dark:text-white text-base"> Rescue Connect </span>
    </div>

    <p-button
      [text]="true"
      [rounded]="true"
      (onClick)="toggleTheme()"
      [icon]="themeService.darkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      class="bg-gray-200/40 dark:bg-slate-800 rounded-full"
      severity="secondary"
      aria-label="Cambiar tema"
    />
  </div>
  }

  <nav class="flex-1 px-3 py-5 overflow-y-auto">
    <ul class="space-y-1">
      @for (item of navItems; track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-gray-100 dark:bg-slate-800 text-black! dark:text-white! font-semibold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-md text-gray-600 dark:text-gray-400 hover:bg-pink-50 dark:hover:bg-pink-950/20 hover:text-gray-900 dark:hover:text-white transition-all cursor-pointer text-sm"
          (click)="closeSidebar.emit()"
        >
          <i [class]="item.icon + ' text-lg w-5 text-center'"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
      }
    </ul>
  </nav>

  <div class="px-4 py-4 border-t border-gray-100 dark:border-gray-700">
    @if (currentUser()) {
    <div class="flex items-center gap-3 px-2 mb-3">
      <div
        class="w-8 h-8 rounded-full bg-pink-100 dark:bg-pink-950/30 flex items-center justify-center shrink-0"
      >
        <i class="pi pi-user text-sm text-pink-600! dark:text-pink-300!"></i>
      </div>
      <div class="overflow-hidden">
        <p class="text-sm font-medium text-gray-800 dark:text-white truncate">
          {{ currentUser()?.firstName }} {{ currentUser()?.lastName }}
        </p>
        <p class="text-xs text-gray-400 truncate">{{ currentUser()?.email }}</p>
      </div>
    </div>
    }
    <button
      (click)="logout()"
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10! transition-all text-sm cursor-pointer font-medium"
    >
      <i class="pi pi-sign-out text-lg w-5 text-center"></i>
      <span>Cerrar Sesión</span>
    </button>
  </div>
</aside>
