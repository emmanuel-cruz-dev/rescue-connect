<div class="flex gap-2">
  @for (social of socialLinks; track social.icon) {
  <a
    [href]="social.url"
    target="_blank"
    rel="noopener noreferrer"
    class="p-button p-button-text p-button-rounded text-black hover:text-pink-600 dark:text-white dark:hover:text-pink-600 transition-colors duration-300"
    [attr.aria-label]="'Ir a ' + social.label"
    [pTooltip]="social.label"
    tooltipPosition="bottom"
  >
    <i [class]="social.icon" aria-hidden="true"></i>
  </a>
  }
</div>
