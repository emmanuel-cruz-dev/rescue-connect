<section
  class="pt-22 pb-16 bg-linear-to-b from-pink-50/90 to-white dark:bg-slate-900 dark:bg-linear-to-b dark:from-pink-950/30 dark:to-slate-900"
>
  <div class="max-w-6xl mx-auto px-4">
    <header
      pAnimateOnScroll
      once="true"
      enterClass="animate-enter fade-in-10 slide-in-from-t-12 animate-duration-1000"
      class="text-center"
    >
      <h1 class="text-4xl md:text-5xl font-bold text-gray-900 dark:text-white mb-6">
        Sé <span class="text-pink-600">la voz</span> de los que no pueden defenderse
      </h1>
      <p class="text-lg text-gray-600 dark:text-gray-300 max-w-2xl mx-auto">
        Cada día, miles de animales sufren en silencio. Tu denuncia puede marcar la diferencia entre
        el abandono y una nueva oportunidad.
      </p>
    </header>
    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 lg:grid-rows-12 gap-4 pt-12 mx-auto lg:h-180"
    >
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-l-6 animate-duration-1000"
        class="hidden lg:block lg:col-span-5 lg:row-span-4 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/perro-marron.webp"
          class="w-full h-full object-cover"
          alt="Primer plano del rostro de un perro de pelaje marrón claro detrás de una malla de alambre metálica. Sus ojos marrones están fijos en la cámara con expresión suplicante"
          width="600"
          height="338"
          loading="lazy"
        />
      </figure>
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-b-6 animate-duration-1000"
        class="lg:col-span-3 lg:row-span-5 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/rescate.webp"
          class="w-full h-full object-cover"
          alt="Primer plano de una profesional de la salud animal con mascarilla rosa y guantes médicos del mismo color, sosteniendo con cuidado a un cachorro blanco con manchas oscuras en un entorno de inspección"
          width="800"
          height="636"
          loading="lazy"
        />
      </figure>
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-r-6 animate-duration-1000"
        class="lg:col-span-4 lg:row-span-8 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/perros-jaula.webp"
          class="w-full h-full object-cover"
          alt="Primer plano de un cachorro de pelaje marrón y negro con expresión triste y suplicante mirando a través de los barrotes de una jaula de metal oxidado. Otro cachorro está visible al fondo"
          width="800"
          height="533"
          loading="lazy"
        />
      </figure>
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-l-6 animate-duration-1000"
        class="lg:col-span-5 lg:row-span-8 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/labrador-enjaulado.webp"
          class="w-full h-full object-cover"
          alt="Primer plano de un cachorro de labrador color crema con una expresión de profunda tristeza y ojos llorosos, mirando directamente a través de los barrotes negros de una jaula"
          width="800"
          height="630"
          loading="lazy"
        />
      </figure>
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-b-6 animate-duration-1000"
        class="lg:col-span-3 lg:row-span-3 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/perros-salchicha.webp"
          class="w-full h-full object-cover"
          alt="Primer plano de un perro salchicha mirando a través de una malla metálica con expresión expectante. Al fondo se ven otros perros de la misma raza en un área cercada con arena"
          width="800"
          height="533"
          loading="lazy"
        />
      </figure>
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-t-6 animate-duration-1000"
        class="hidden lg:block lg:col-span-5 lg:row-span-4 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/gatos-enjaulados.webp"
          alt="Varios gatos de pelaje gris y negro encerrados en una jaula de metal pequeña y oxidada. Los animales están amontonados unos sobre otros con expresiones de miedo y alerta"
          class="w-full h-full object-cover"
          width="800"
          height="450"
          loading="lazy"
        />
      </figure>
      <figure
        pAnimateOnScroll
        once="true"
        enterClass="animate-enter fade-in-10 slide-in-from-r-6 animate-duration-1000"
        class="hidden lg:block lg:col-span-2 lg:row-span-4 w-full h-full overflow-hidden rounded-2xl"
      >
        <img
          src="assets/images/report/perro-triste-enjaulado.webp"
          class="w-full h-full object-cover"
          alt="Un perro de pelaje largo y descuidado, visiblemente sucio, encerrado en una pequeña jaula de metal con suelo de rejilla. El animal tiene una expresión de miedo y tristeza"
          width="800"
          height="800"
          loading="lazy"
        />
      </figure>
    </div>
  </div>
</section>
