<section
  class="py-16 bg-linear-to-b from-pink-50/90 to-white dark:bg-slate-900 dark:bg-linear-to-b dark:from-pink-950/30 dark:to-slate-900"
>
  <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
    <div
      pAnimateOnScroll
      once="true"
      enterClass="animate-enter fade-in-10 slide-in-from-l-12 animate-duration-1000 animate-delay-400"
      class="grid grid-cols-2 gap-4 items-center"
    >
      <figure class="rounded-2xl shadow-xl overflow-hidden aspect-square mb-12">
        <img
          src="assets/images/report/tres-perros-jaula.webp"
          alt="Tres perros de raza pequeña, incluyendo un Bulldog Francés y un Boston Terrier, dentro de una jaula de transporte metálica con un cuenco de agua azul al frente"
          class="w-full h-full object-cover"
          width="670"
          height="702"
          loading="lazy"
        />
      </figure>
      <figure class="rounded-2xl shadow-xl overflow-hidden aspect-square mt-12">
        <img
          src="assets/images/report/caniche-rescatado.webp"
          alt="Un perro pequeño tipo caniche o terrier rescatado, con el pelo descuidado y mojado, sostenido por una persona con guantes protectores en un entorno de atención médica animal"
          class="w-full h-full object-cover"
          width="670"
          height="702"
          loading="lazy"
        />
      </figure>
    </div>

    <div
      pAnimateOnScroll
      once="true"
      enterClass="animate-enter fade-in-10 slide-in-from-r-12 animate-duration-1000 animate-delay-400"
      class="flex flex-col gap-3"
    >
      <h2 class="text-3xl lg:text-4xl font-bold text-gray-900 dark:text-white mb-4">
        Pasos para <span class="text-pink-600">denunciar</span> el maltrato animal
      </h2>

      @for (step of steps; track step.header) {
      <p-panel
        [toggleable]="true"
        [(collapsed)]="step.collapsed"
        (collapsedChange)="toggleStep(step)"
        toggler="header"
      >
        <ng-template pTemplate="header">
          <div class="flex items-center gap-2 font-semibold text-gray-800 dark:text-white">
            {{ step.header }}
          </div>
        </ng-template>

        <ul
          class="m-0 space-y-2 text-gray-600 dark:text-gray-300 list-disc list-inside marker:text-pink-600 bg-neutral-100 dark:bg-neutral-500/10 py-3 px-4 rounded-lg"
        >
          @for (item of step.items; track item.text) {
          <li>
            @if (item.label) {
            <strong>{{ item.label }} </strong>
            } @if (item.text) {
            {{ item.text }}
            } @if (item.link) {
            <a
              [href]="item.link.href"
              target="_blank"
              rel="noopener noreferrer"
              class="text-pink-600 hover:underline"
              >{{ item.link.label }}</a
            >
            }
          </li>
          }
        </ul>
      </p-panel>
      }
    </div>
  </div>
</section>
