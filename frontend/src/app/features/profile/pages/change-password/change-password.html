<div class="max-w-md mx-auto px-4 py-10">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0">Cambiar Contraseña</h1>
    <p class="text-surface-500 mt-1">Actualiza tu contraseña de acceso</p>
  </div>

  <div
    class="bg-white dark:bg-surface-800 rounded-2xl p-8 shadow-sm border border-surface-100 dark:border-surface-700 text-center"
  >
    <i class="pi pi-lock text-5xl text-surface-300 dark:text-surface-600 mb-4 block"></i>
    <p class="text-surface-500">Formulario de cambio de contraseña</p>
    <p class="text-surface-400 text-sm mt-1 mb-4">Contenido de la página de cambio de contraseña</p>
    <p-button
      label="Volver al perfil"
      icon="pi pi-arrow-left"
      routerLink="/profile/me"
      [outlined]="true"
      severity="secondary"
    />
  </div>
</div>
