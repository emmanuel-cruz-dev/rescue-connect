<section class="p-6">
  <header class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 dark:text-white">Mi Perfil</h1>
      <p class="text-gray-400 mt-1">Visualizá y editá tu información personal</p>
    </div>
  </header>

  <main
    class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden"
  >
    @if (currentUser()) {
    <div
      class="flex flex-col sm:flex-row items-center sm:items-start gap-6 px-6 py-8 border-b border-gray-100 dark:border-gray-800"
    >
      <div
        class="w-16 h-16 rounded-full bg-pink-50 dark:bg-pink-950/30 flex items-center justify-center shrink-0"
      >
        <i class="pi pi-user text-2xl text-pink-500"></i>
      </div>
      <div>
        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">
          {{ currentUser()?.firstName }} {{ currentUser()?.lastName }}
        </h2>
        <p class="text-gray-400 mt-0.5">{{ currentUser()?.email }}</p>
        <p-tag
          class="mt-2"
          [value]="currentUser()?.role === 'admin' ? 'Administrador' : 'Usuario'"
          [severity]="currentUser()?.role === 'admin' ? 'warn' : 'info'"
        />
      </div>
    </div>

    <div
      class="grid grid-cols-1 sm:grid-cols-2 gap-0 divide-y sm:divide-y-0 sm:divide-x divide-gray-100 dark:divide-gray-800"
    >
      <div class="px-6 py-5">
        <label class="text-xs text-gray-400 uppercase font-semibold tracking-wider">Teléfono</label>
        <p class="text-gray-700 dark:text-gray-200 mt-1 font-medium">
          {{ currentUser()?.phone || 'No registrado' }}
        </p>
      </div>
      <div class="px-6 py-5">
        <label class="text-xs text-gray-400 uppercase font-semibold tracking-wider"
          >Dirección</label
        >
        <p class="text-gray-700 dark:text-gray-200 mt-1 font-medium">
          {{ currentUser()?.address || 'No registrada' }}
        </p>
      </div>
    </div>
    }
  </main>
</section>
