<div class="max-w-5xl mx-auto px-4 py-10">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-surface-900 dark:text-surface-0">Mis Adopciones</h1>
    <p class="text-surface-500 mt-1">Mascotas que has adoptado a través de Rescue Connect</p>
  </div>

  <div class="bg-white dark:bg-surface-800 rounded-2xl p-8 shadow-sm border border-surface-100 dark:border-surface-700 text-center">
    <i class="pi pi-heart text-5xl text-surface-300 dark:text-surface-600 mb-4 block"></i>
    <p class="text-surface-500">Aquí aparecerán las mascotas que has adoptado.</p>
    <p-button
      label="Ver mascotas disponibles"
      icon="pi pi-search"
      class="mt-4"
      routerLink="/pets"
      [outlined]="true"
    />
  </div>
</div>
