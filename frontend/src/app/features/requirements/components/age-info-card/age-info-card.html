<article class="flex flex-col items-center text-center gap-4">
  <div
    class="relative shrink-0"
    [class]="{
      'ring-amber-400': stage.key === 'cachorro',
      'ring-sky-400': stage.key === 'joven',
      'ring-rose-400': stage.key === 'adulto',
      'ring-violet-400': stage.key === 'abuelo'
    }"
  >
    <figure class="w-44 h-44 rounded-full overflow-hidden ring-2 ring-offset-2 shadow-lg">
      <img
        [src]="stage.image"
        [alt]="stage.label"
        class="w-full h-full object-cover"
        width="540"
        height="540"
        loading="lazy"
      />
    </figure>
    <div
      class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/3 px-5 py-1 rounded-full text-white text-xs font-bold tracking-widest uppercase shadow-md"
      [class]="{
        'bg-amber-500': stage.key === 'cachorro',
        'bg-sky-500': stage.key === 'joven',
        'bg-rose-500': stage.key === 'adulto',
        'bg-violet-500': stage.key === 'abuelo'
      }"
    >
      {{ stage.label }}
    </div>
  </div>
  <p class="text-lg mt-5 font-bold text-gray-700 dark:text-gray-200">
    {{ stage.ageRange }}
  </p>
  <p class="text-gray-500 dark:text-gray-400 leading-relaxed">
    {{ stage.description }}
  </p>
</article>
