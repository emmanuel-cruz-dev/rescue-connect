<header
  class="mb-12"
  pAnimateOnScroll
  once="true"
  enterClass="animate-enter fade-in-10 slide-in-from-b-8 animate-duration-700"
>
  <span
    class="inline-flex items-center gap-2 bg-pink-100 dark:bg-pink-900/40 text-pink-600 dark:text-pink-400 text-sm font-medium px-4 py-1.5 rounded-full mb-5"
  >
    <i class="pi pi-file-edit text-xs"></i>
    Documento legal
  </span>
  <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-3">
    {{ title() }} <span class="text-pink-600">{{ highlight() }}</span>
  </h1>
  <p class="text-gray-600 dark:text-gray-300 text-lg mb-4">{{ description() }}</p>
  @if (date()) {
  <span class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400">
    <i class="pi pi-calendar text-xs"></i>
    Última actualización: {{ date() }}
  </span>
  }
</header>
