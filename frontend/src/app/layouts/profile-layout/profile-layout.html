<div class="bg-white dark:bg-pink-600/10 h-16">
  <app-navbar />
</div>
<div
  class="flex h-screen overflow-hidden bg-linear-to-b from-pink-50/90 to-white dark:bg-slate-900 dark:bg-linear-to-b dark:from-pink-950/30 dark:to-slate-900"
>
  <main class="flex grow max-w-7xl mx-auto w-full">
    <app-sidebar [showHeader]="false" class="shrink-0 hidden lg:block" />

    <p-drawer
      [(visible)]="sidebarDrawerVisible"
      position="left"
      [showCloseIcon]="false"
      styleClass="w-64! p-0!"
    >
      <ng-template pTemplate="headless">
        <app-sidebar
          [showHeader]="false"
          class="h-full"
          (closeSidebar)="sidebarDrawerVisible = false"
        />
      </ng-template>
    </p-drawer>

    <div class="grow overflow-y-auto">
      <div
        class="lg:hidden flex items-center gap-3 px-4 py-3 bg-white dark:bg-slate-900 border-b border-gray-100 dark:border-gray-700 sticky top-0 z-10"
      >
        <button
          (click)="sidebarDrawerVisible = true"
          class="flex items-center justify-center w-9 h-9 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors"
        >
          <i class="pi pi-bars text-gray-600 dark:text-gray-300"></i>
        </button>
      </div>

      <router-outlet />
    </div>
  </main>
</div>
<app-footer />
